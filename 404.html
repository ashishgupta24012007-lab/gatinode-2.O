<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Gati Node Transport</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="logo-v2.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1437;
      --gold: #C9A96E;
      --white: #ffffff;
      --primary: #1D3D8F;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0B1437 0%, #0d1b4b 60%, #071029 100%);
      font-family: 'Inter', sans-serif;
      color: var(--white);
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 560px;
      margin: 0 auto;
    }
    .error-code {
      font-family: 'Sora', sans-serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #C9A96E, #E8C87A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .truck-icon {
      font-size: 3rem;
      margin-bottom: 20px;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: rgba(255,255,255,0.7);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #C9A96E, #E8C87A);
      color: #0B1437;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 6px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,169,110,0.35);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: var(--white);
    }
    .btn-outline:hover {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 8px 24px rgba(201,169,110,0.15);
    }
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #C9A96E, #E8C87A);
      border-radius: 2px;
      margin: 0 auto 28px;
    }
    .logo {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }
    .logo span {
      color: var(--gold);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo" aria-label="Gati Node Home">GATI <span>NODE</span></a>
    <span class="truck-icon" aria-hidden="true">🚛</span>
    <div class="error-code" aria-label="Error 404">404</div>
    <div class="divider"></div>
    <h1>Page Not Found</h1>
    <p>Looks like this route doesn't exist. The page you're looking for may have been moved, deleted, or never existed. Let's get you back on track.</p>
    <div>
      <a href="/" class="btn">← Back to Home</a>
      <a href="/#contact" class="btn btn-outline">Contact Us</a>
    </div>
  </div>
</body>
</html>
